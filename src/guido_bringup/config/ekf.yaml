ekf_filter_node:
  ros__parameters:
    # Wheel odom + IMU yaw: dead-reckoning between SLAM map->odom updates.
    frequency: 50.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom
    odom0: /odom
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    imu0: /imu/data_raw
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
