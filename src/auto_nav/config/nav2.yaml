amcl:
  ros__parameters:
    use_sim_time: false

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.01
    min_theta_velocity_threshold: 0.01
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['goal_checker']
    controller_plugins: ['FollowPath']
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.1
      movement_time_allowance: 8.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.35
      stateful: true
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      debug_trajectory_details: false
      min_vel_x: 0.0
      max_vel_x: 0.12
      max_vel_theta: 0.5
      min_speed_xy: 0.0
      max_speed_xy: 0.12
      min_speed_theta: 0.0
      acc_lim_x: 0.2
      acc_lim_theta: 0.6
      decel_lim_x: -0.25
      decel_lim_theta: -0.6
      vx_samples: 12
      vtheta_samples: 20
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.05
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.02
      critics:
        - RotateToGoal
        - ObstacleFootprint
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      PathAlign.scale: 12.0
      GoalAlign.scale: 8.0
      PathDist.scale: 24.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 20.0
      ObstacleFootprint.scale: 32.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      footprint: '[[0.35,0.30],[0.35,-0.30],[-0.35,-0.30],[-0.35,0.30]]'
      plugins: ['obstacle_layer', 'inflation_layer']
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /ldlidar_node/scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.45
        cost_scaling_factor: 4.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_footprint
      resolution: 0.05
      footprint: '[[0.35,0.30],[0.35,-0.30],[-0.35,-0.30],[-0.35,0.30]]'
      track_unknown_space: true
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /ldlidar_node/scan
          data_type: LaserScan
          clearing: true
          marking: true
          obstacle_max_range: 5.0
          raytrace_max_range: 6.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.50
        cost_scaling_factor: 4.0

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0
    planner_plugins: ['GridBased']
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.25
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    costmap_topic: /local_costmap/costmap_raw
    footprint_topic: /local_costmap/published_footprint
    behavior_plugins: ['spin', 'backup', 'wait']
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    feedback: OPEN_LOOP
    max_velocity: [0.12, 0.0, 0.5]
    min_velocity: [0.0, 0.0, -0.5]
    max_accel: [0.2, 0.0, 0.6]
    max_decel: [-0.25, 0.0, -0.6]
