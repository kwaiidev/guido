guido_serial_bridge:
  ros__parameters:
    serial_port: '/dev/ttyUSB1'
    baudrate: 115200
    wheel_base: 0.17          # meters, must match Arduino WHEEL_BASE
    max_wheel_vel: 0.5        # m/s at PWM 255; measure and tune this
    cmd_timeout_sec: 0.5      # send STOP after this many seconds with no cmd_vel
    odom_frame: 'odom'
    base_frame: 'base_footprint'
    # Left motor channel is wired opposite ROS forward on this chair.
    invert_left: true
    invert_right: false
