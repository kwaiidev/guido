guido_serial_bridge:
  ros__parameters:
    serial_port: '/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0'
    baudrate: 115200
    wheel_base: 0.17          # meters, must match Arduino WHEEL_BASE
    max_wheel_vel: 0.5        # m/s at PWM 255; measure and tune this
    cmd_timeout_sec: 0.5      # send STOP after this many seconds with no cmd_vel
    odom_frame: 'odom'
    base_frame: 'base_footprint'
    # Direction and gain calibration for the chair's motor controller channels.
    swap_left_right: false
    invert_left: false
    invert_right: false
    left_pwm_scale: 1.0
    right_pwm_scale: 1.0
    left_min_abs_pwm: 45
    right_min_abs_pwm: 35
